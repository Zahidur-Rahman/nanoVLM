<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800" width="100%" height="100%">
  <defs>
    <!-- Arrowhead definition -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555" />
    </marker>
    
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="imageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd" />
      <stop offset="100%" stop-color="#bbdefb" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9" />
      <stop offset="100%" stop-color="#c8e6c9" />
    </linearGradient>
    <linearGradient id="lossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0" />
      <stop offset="100%" stop-color="#ffe0b2" />
    </linearGradient>
  </defs>

  <rect width="900" height="800" fill="#f8f9fa" rx="10" />
  
  <text x="450" y="40" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">NanoVLM Architecture (CNN-Attention Hybrid)</text>

  <!-- ==================== IMAGE BRANCH (Left) ==================== -->
  <g transform="translate(150, 80)">
    <!-- Branch Title -->
    <text x="125" y="-10" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1565c0">IMAGE ENCODER</text>
    
    <!-- Input Image -->
    <rect x="0" y="0" width="250" height="50" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="30" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Input Image</text>
    <text x="260" y="30" font-family="sans-serif" font-size="12" fill="#666">(3, 224, 224)</text>
    <line x1="125" y1="50" x2="125" y2="80" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

    <!-- MobileNetV2 -->
    <rect x="0" y="80" width="250" height="60" rx="8" fill="url(#imageGrad)" stroke="#1976d2" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="105" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">MobileNetV2 Backbone</text>
    <text x="125" y="125" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555">(Frozen Low-Level Features)</text>
    <text x="260" y="115" font-family="sans-serif" font-size="12" fill="#666">(1280, 7, 7)</text>
    <line x1="125" y1="140" x2="125" y2="170" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Flatten/Permute -->
    <rect x="0" y="170" width="250" height="50" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="190" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Flatten &amp; Linear Proj.</text>
    <text x="125" y="210" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555">Dim Reduction: 1280 → 256</text>
    <text x="260" y="200" font-family="sans-serif" font-size="12" fill="#666">(49, 256)</text>
    <line x1="125" y1="220" x2="125" y2="250" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Spatial Attention -->
    <rect x="0" y="250" width="250" height="60" rx="8" fill="url(#imageGrad)" stroke="#1976d2" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="275" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Spatial Self-Attention</text>
    <text x="125" y="295" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555">Pre-Norm + Multi-Head + Residual</text>
    <text x="260" y="285" font-family="sans-serif" font-size="12" fill="#666">(49, 256)</text>
    <line x1="125" y1="310" x2="125" y2="340" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Per-Token MLP -->
    <rect x="0" y="340" width="250" height="50" rx="8" fill="url(#imageGrad)" stroke="#1976d2" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="360" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Per-Token MLP Head</text>
    <text x="125" y="380" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555">Pre-Norm + Residual</text>
    <text x="260" y="370" font-family="sans-serif" font-size="12" fill="#666">(49, 256)</text>
    <line x1="125" y1="390" x2="125" y2="420" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

    <!-- GAP -->
    <rect x="25" y="420" width="200" height="40" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="445" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Global Average Pooling</text>
    <text x="235" y="440" font-family="sans-serif" font-size="12" fill="#666">(256)</text>
    <line x1="125" y1="460" x2="125" y2="520" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Layer Norm + L2 Norm -->
    <rect x="0" y="520" width="250" height="50" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="540" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">LayerNorm &amp; L2 Norm</text>
    <text x="125" y="560" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555">F.normalize(dim=-1)</text>
    <text x="260" y="545" font-family="sans-serif" font-size="12" fill="#666">(256-d)</text>
  </g>

  <!-- ==================== TEXT BRANCH (Right) ==================== -->
  <g transform="translate(500, 80)">
    <!-- Branch Title -->
    <text x="125" y="-10" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2e7d32">TEXT ENCODER</text>
    
    <!-- Input Text -->
    <rect x="0" y="0" width="250" height="50" rx="8" fill="#ffffff" stroke="#388e3c" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="30" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Input Caption Tokens</text>
    <text x="260" y="30" font-family="sans-serif" font-size="12" fill="#666">(64)</text>
    <line x1="125" y1="50" x2="125" y2="80" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Token + Pos Embedding -->
    <rect x="0" y="80" width="250" height="60" rx="8" fill="url(#textGrad)" stroke="#388e3c" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="105" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Token &amp; Pos Embedding</text>
    <text x="125" y="125" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555">Vocab: 10,000</text>
    <text x="260" y="115" font-family="sans-serif" font-size="12" fill="#666">(64, 256)</text>
    <line x1="125" y1="140" x2="125" y2="170" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Transformer Encoder -->
    <rect x="0" y="170" width="250" height="70" rx="8" fill="url(#textGrad)" stroke="#388e3c" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="195" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Transformer Encoder</text>
    <text x="125" y="215" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555">6 Layers | 4 Heads</text>
    <text x="260" y="205" font-family="sans-serif" font-size="12" fill="#666">(64, 256)</text>
    <line x1="125" y1="240" x2="125" y2="280" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Mean Pooling (Matches Code) -->
    <rect x="25" y="280" width="200" height="50" rx="8" fill="#ffffff" stroke="#388e3c" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="300" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Mean Pooling</text>
    <text x="125" y="320" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555">x.mean(dim=1)</text>
    <text x="235" y="305" font-family="sans-serif" font-size="12" fill="#666">(256)</text>
    <line x1="125" y1="330" x2="125" y2="370" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

    <!-- MLP Projection -->
    <rect x="0" y="370" width="250" height="50" rx="8" fill="url(#textGrad)" stroke="#388e3c" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="390" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Residual MLP Head</text>
    <text x="125" y="410" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555">Linear → GELU → Linear</text>
    <text x="260" y="395" font-family="sans-serif" font-size="12" fill="#666">(256)</text>
    <line x1="125" y1="420" x2="125" y2="520" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Layer Norm + L2 Norm -->
    <rect x="0" y="520" width="250" height="50" rx="8" fill="#ffffff" stroke="#388e3c" stroke-width="2" filter="url(#shadow)" />
    <text x="125" y="540" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">LayerNorm &amp; L2 Norm</text>
    <text x="125" y="560" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555">F.normalize(dim=-1)</text>
    <text x="260" y="545" font-family="sans-serif" font-size="12" fill="#666">(256-d)</text>
  </g>

  <!-- ==================== CONTRASTIVE LOSS (Bottom) ==================== -->
  
  <!-- Diagonal Arrows to Cosine Similarity -->
  <line x1="275" y1="650" x2="420" y2="690" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="625" y1="650" x2="480" y2="690" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

  <g transform="translate(350, 680)">
    <rect x="0" y="0" width="200" height="60" rx="30" fill="url(#lossGrad)" stroke="#f57c00" stroke-width="2" filter="url(#shadow)" />
    <text x="100" y="25" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e65100">Cosine Similarity</text>
    <text x="100" y="45" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#e65100">Contrastive InfoNCE Loss</text>
  </g>

</svg>
